<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mobile Hero Mockups</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f4f1;
        color: #191919;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      h1 {
        margin: 0 0 22px;
        font-size: clamp(28px, 4vw, 48px);
        letter-spacing: 0;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 24px;
        align-items: start;
      }

      figure {
        margin: 0;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 16px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.16);
        background: #111;
      }

      figcaption {
        margin-top: 10px;
        font-size: 15px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>Mobile Hero Mockups 9:16</h1>
    <main class="grid">
      <figure>
        <img src="mobile-hero-concept-01b-stacked-steep-angle.svg" alt="Konzept 01b: steiler Winkel" />
        <figcaption>Selected - Steep Angle</figcaption>
      </figure>
    </main>
  </body>
</html>
