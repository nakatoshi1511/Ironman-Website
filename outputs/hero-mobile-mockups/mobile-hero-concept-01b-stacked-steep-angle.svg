<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">Mobile hero concept 01b - stacked steep angle</title>
  <desc id="desc">A steeper stacked diagonal mobile hero layout with more dynamic cuts between Swim, Bike, and Run.</desc>
  <rect width="1080" height="1920" rx="44" fill="#111111"/>
  <polygon points="0,0 1080,0 1080,455 0,820" fill="#228fbd"/>
  <polygon points="0,645 1080,280 1080,1245 0,1610" fill="#dfb23f"/>
  <polygon points="0,1390 1080,1025 1080,1920 0,1920" fill="#4e9b5e"/>
  <g font-family="Arial, Helvetica, sans-serif" fill="#ffffff">
    <g text-anchor="middle">
      <text x="540" y="265" font-size="86" font-weight="800">SWIM</text>
      <text x="540" y="322" font-size="32" font-weight="700" opacity="0.78">Swim.JPG</text>
    </g>
    <g text-anchor="middle">
      <text x="540" y="955" font-size="94" font-weight="800">BIKE</text>
      <text x="540" y="1017" font-size="34" font-weight="700" opacity="0.78">Bike.JPG</text>
    </g>
    <g text-anchor="middle">
      <text x="540" y="1675" font-size="86" font-weight="800">RUN</text>
      <text x="540" y="1732" font-size="32" font-weight="700" opacity="0.78">Run.JPG</text>
    </g>
  </g>
</svg>
